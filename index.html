<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/dark-mode.css">
    <title>Capa</title>
</head>
<body>

   <section class="forms-section">
  <div class="forms">
    <div class="form-wrapper is-active">
      <form class="form form-login">
        <fieldset>
          <div class="theme-logo-wrap login-theme-logo">
            <img src="./img/1.png" alt="Conectel" class="logoo theme-logo theme-logo-light">
            <img src="./img/2.png" alt="Conectel" class="logoo theme-logo theme-logo-dark">
          </div>

          <div class="input-block">
            <label for="login-email">E-mail</label>
            <input id="login-email" type="text" required>
          </div>
          <div class="input-block">
            <label for="login-password">Senha</label>
            <input id="login-password" type="password" required>
          </div>
      <div class="button">

      <div class="radio">

        <label>
          <input type="radio" name="tipo" value="admin"> Admin
        </label>

        <label>
          <input type="radio" name="tipo" value="operacional"> Operacional
        </label>

        <label>
          <input type="radio" name="tipo" value="financeiro"> Financeiro
        </label>

        <label>
          <input type="radio" name="tipo" value="diretoria"> Diretoria
        </label>

      </div>
        <br>
        <button type="submit" class="btn-login" id="btnLogin">Login</button>
      </div>
        </fieldset>

      </form>
    </div>

</section>

    <script src="./js/supabase.js"></script>
    <script src="./js/app-utils.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/login.js"></script>
    <script src="./js/dark-mode.js"></script>

</body>
</html>
